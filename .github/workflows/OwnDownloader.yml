name: Direct-Download

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Direct download link'
        required: true
      filename:
        description: 'Output filename (optional - extracted from URL if empty)'
        required: false
        default: ''

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y aria2 zip

      - name: Set filename and clean URL
        id: vars
        run: |
          CLEAN_URL="${{ github.event.inputs.url }}"
          CLEAN_URL="${CLEAN_URL%%\?*}"
          if [ -z "${{ github.event.inputs.filename }}" ]; then
            FILENAME=$(basename "$CLEAN_URL")
          else
            FILENAME="${{ github.event.inputs.filename }}"
          fi
          echo "clean_url=$CLEAN_URL" >> $GITHUB_OUTPUT
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT

      - name: Download with aria2 (curl fallback)
        run: |
          mkdir -p downloads
          cd downloads
          URL="${{ steps.vars.outputs.clean_url }}"
          FILENAME="${{ steps.vars.outputs.filename }}"

          echo "Trying aria2c..."
          if aria2c \
            --split=2 \
            --max-connection-per-server=2 \
            --min-split-size=20M \
            --max-tries=3 \
            --retry-wait=5 \
            --timeout=60 \
            --connect-timeout=30 \
            --allow-overwrite=true \
            --auto-file-renaming=false \
            -o "$FILENAME" \
            "$URL" 2>/dev/null && [ -s "$FILENAME" ]; then
            echo "aria2c success"
          else
            echo "aria2c failed, trying curl..."
            rm -f "$FILENAME" "$FILENAME.aria2"
            curl -L --retry 3 --retry-delay 5 -A "Mozilla/5.0" -o "$FILENAME" "$URL" && echo "curl success" || echo "Download failed"
          fi

      - name: Split if larger than 45MB
        id: split
        run: |
          cd downloads
          FILENAME="${{ steps.vars.outputs.filename }}"
          SIZE=$(stat -c%s "$FILENAME")
          THRESHOLD=$((45 * 1024 * 1024))

          if [ "$SIZE" -gt "$THRESHOLD" ]; then
            echo "File is $((SIZE / 1024 / 1024))MB - splitting into 45MB parts"
            BASENAME="${FILENAME%.*}"
            PARTS_DIR="${BASENAME}.parts"
            mkdir -p "$PARTS_DIR"
            zip -s 45m -j "${PARTS_DIR}/${BASENAME}.zip" "$FILENAME"
            rm "$FILENAME"
            echo "split=true" >> $GITHUB_OUTPUT
          else
            echo "File is $((SIZE / 1024 / 1024))MB - no split needed"
            echo "split=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          if [ "${{ steps.split.outputs.split }}" = "true" ]; then
            git commit -m "Add split parts for ${{ steps.vars.outputs.filename }}" || echo "No changes"
          else
            git commit -m "Add ${{ steps.vars.outputs.filename }}" || echo "No changes"
          fi
          git push
