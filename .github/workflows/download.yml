name: Download and Split to 45MB Parts

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Direct download link'
        required: true
      filename:
        description: 'Output filename (optional)'
        required: false
        default: ''

jobs:
  download-and-split:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set filename and clean URL
        id: vars
        run: |
          URL="${{ github.event.inputs.url }}"
          CLEAN_URL="${URL%%\?*}"
          if [ -z "${{ github.event.inputs.filename }}" ]; then
            FILENAME=$(basename "$CLEAN_URL")
          else
            FILENAME="${{ github.event.inputs.filename }}"
          fi
          echo "clean_url=$CLEAN_URL" >> $GITHUB_OUTPUT
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT

      - name: Install aria2 and 7zip
        run: sudo apt-get update && sudo apt-get install -y aria2 p7zip-full

      - name: Download file with aria2
        run: |
          mkdir -p downloads
          cd downloads
          aria2c -x 4 -s 4 -o "${{ steps.vars.outputs.filename }}" "${{ steps.vars.outputs.clean_url }}"

      - name: Split into 45 MB parts using 7zip
        run: |
          FILENAME="${{ steps.vars.outputs.filename }}"
          PARTS_DIR="downloads/${FILENAME}.parts"
          mkdir -p "$PARTS_DIR"
          cd downloads
          7z a -v45m -mx0 "${FILENAME}.parts/${FILENAME}.7z" "$FILENAME"
          rm -f "$FILENAME"

      - name: Commit and push parts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "Add split parts for ${{ steps.vars.outputs.filename }} (45 MB each)" || echo "No changes to commit"
          git push
